name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          echo "${{ secrets.SSH_HOST_KEY }}" >> ~/.ssh/known_hosts
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /opt/sme-pm
            docker compose down
            docker compose pull
            docker compose up -d
            docker image prune -f
          EOF

      - name: Health check
        run: |
          sleep 10
          curl -f https://${{ inputs.environment }}.sme-pm.example.com/actuator/health || exit 1

  backup:
    name: Database Backup
    runs-on: ubuntu-latest
    if: inputs.environment == 'production'
    needs: deploy

    steps:
      - name: Backup database
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            docker exec sme-pm-mysql mysqldump -u root -p${{ secrets.DB_ROOT_PASSWORD }} sme_pm > /backups/sme_pm_$(date +%Y%m%d_%H%M%S).sql
            find /backups -name "sme_pm_*.sql" -mtime +7 -delete
          EOF
