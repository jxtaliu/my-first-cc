spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: this-is-a-very-long-secret-key-for-testing-purposes-at-least-256-bits
  expiration: 86400000

logging:
  level:
    root: WARN
    com.sme.pm: DEBUG
